        let currentQuestionIdx = 0;
        let userScores = {};
        for (let k in personalities) userScores[k] = 0;

        // Functions
        function startTest() {
            lucide.createIcons();
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestionIdx];
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <div class="animate-in space-y-6">
                    <div class="flex justify-between items-center text-[10px] text-yellow-500/60 mb-2 uppercase tracking-tighter">
                        <span>评估进程: ${currentQuestionIdx + 1} / ${questions.length}</span>
                        <span class="animate-pulse">[ 正在扫描忠诚度 ]</span>
                    </div>
                    <h3 class="text-lg md:text-xl font-bold leading-tight border-l-4 border-yellow-500 pl-4 py-2 bg-yellow-500/5">
                        ${q.text}
                    </h3>
                    <div class="grid gap-3 mt-8">
                        ${q.options.map((opt, idx) => `
                            <button onclick="handleAnswer(${idx})" class="w-full text-left p-3 hd-border bg-gray-900/50 hover:bg-yellow-500/10 transition-all group relative overflow-hidden">
                                <div class="absolute inset-0 bg-yellow-500/5 scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
                                <div class="relative flex items-start">
                                    <span class="text-yellow-500 font-bold mr-3 group-hover:text-white">${String.fromCharCode(65 + idx)}.</span>
                                    <span class="text-[11px] md:text-xs text-gray-300 group-hover:text-white leading-relaxed">${opt.text}</span>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleAnswer(idx) {
            const q = questions[currentQuestionIdx];
            const score = q.options[idx].score;
            for (let k in score) userScores[k] += score[k];

            currentQuestionIdx++;
            if (currentQuestionIdx < questions.length) {
                renderQuestion();
            } else {
                showAnalyzing();
            }
        }

        function showAnalyzing() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="text-center py-16 animate-in">
                    <div class="inline-block mb-8 relative">
                        <i data-lucide="loader-2" class="w-12 h-12 text-yellow-500 animate-spin"></i>
                    </div>
                    <h2 class="text-xl font-bold text-yellow-400 mb-2 uppercase">评估报告生成中</h2>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-8">真理部正在核实您的忠诚度档案...</p>
                    <div class="w-full max-w-xs mx-auto h-1 bg-gray-800 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-yellow-500 transition-all duration-2000 ease-in-out" style="width: 0%"></div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            
            setTimeout(() => {
                document.getElementById('progress-bar').style.width = '100%';
            }, 100);

            setTimeout(showResult, 2500);
        }

        function showResult() {
            let maxScore = -1;
            let resultKey = 'scavenger';
            
            const keys = Object.keys(userScores);
            keys.sort(() => Math.random() - 0.5);
            
            for (let k of keys) {
                if (userScores[k] > maxScore) {
                    maxScore = userScores[k];
                    resultKey = k;
                }
            }
            
            const p = personalities[resultKey];
            const content = document.getElementById('content');
            content.innerHTML = `
                <div id="result-card" class="animate-in space-y-4">
                    <div class="unit-image-container">
                        <img src="${p.img}" alt="${p.name}" class="unit-image" onerror="this.src='https://via.placeholder.com/300x300/0A0A0A/FFE800?text=${p.name}'">
                        <div class="result-tag">TOP SECRET</div>
                        <div class="absolute bottom-2 left-2 text-[8px] text-yellow-500/40 uppercase">Super Earth Intelligence Dept.</div>
                    </div>
                    <div class="text-center mb-4">
                        <h2 class="text-[10px] text-yellow-500/60 uppercase mb-1">评估结果: ${resultKey.toUpperCase()}</h2>
                        <h1 class="text-2xl md:text-3xl font-black text-yellow-400 hd-text-glow uppercase">${p.name}</h1>
                    </div>
                    <div class="bg-yellow-500/5 p-4 hd-border border-yellow-500/30">
                        <div class="description-box pr-2">
                            <p class="text-xs md:text-sm text-gray-200 leading-relaxed mb-4 italic">
                                "${p.desc}"
                            </p>
                        </div>
                        <p class="text-[10px] text-red-500 font-bold uppercase border-t border-red-900/30 pt-2 mt-2">
                            ${p.irony}
                        </p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <button onclick="location.reload()" class="p-3 text-[10px] border border-yellow-500/50 text-yellow-500 hover:bg-yellow-500/10 uppercase font-bold tracking-widest">
                            重新评估
                        </button>
                        <button onclick="captureResult()" class="btn-hd p-3 text-[10px] uppercase font-bold tracking-widest">
                            生成分享海报
                        </button>
                    </div>
                    <div class="text-center mt-4">
                        <p class="text-[8px] text-gray-600 uppercase">分享你的 HBTI 报告，召集更多战友！</p>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function captureResult() {
            const container = document.getElementById('app-container');
            const buttons = container.querySelector('.grid');
            const tips = container.querySelector('.text-center.mt-4');
            
            buttons.style.display = 'none'; 
            if(tips) tips.style.display = 'none';
            
            html2canvas(container, {
                backgroundColor: '#0A0A0A',
                scale: 2,
                logging: false,
                useCORS: true
            }).then(canvas => {
                buttons.style.display = 'grid'; 
                if(tips) tips.style.display = 'block';
                
                const link = document.createElement('a');
                link.download = `HBTI_REPORT_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Init
        lucide.createIcons();
    </script>
